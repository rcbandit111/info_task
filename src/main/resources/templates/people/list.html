<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>People List</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
    <h1>People Management</h1>

    <!-- Success message -->
    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>

    <!-- Search form -->
    <form th:action="@{/people/search}" method="get" class="row g-3 mb-4">
        <div class="col-auto">
            <input type="text" name="name" class="form-control" placeholder="Search by name" th:value="${searchName}">
        </div>
        <div class="col-auto">
            <span class="mx-2">or</span>
        </div>
        <div class="col-auto">
            <input type="text" name="pin" class="form-control" placeholder="Search by PIN" th:value="${searchPin}">
        </div>
        <div class="col-auto">
            <button type="submit" class="btn btn-primary">Search</button>
            <a th:href="@{/people}" class="btn btn-secondary">Clear</a>
        </div>
    </form>

    <!-- Add new person button -->
    <a th:href="@{/people/new}" class="btn btn-success mb-3">Add New Person</a>

    <!-- People table -->
    <table class="table table-bordered table-striped">
        <thead>
        <tr>
            <th>ID</th>
            <th>Full Name</th>
            <th>PIN</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="person : ${people}">
            <td th:text="${person.id}">1</td>
            <td th:text="${person.fullName}">John Doe</td>
            <td th:text="${person.pin}">1234567890</td>
            <td>
                <a th:href="@{'/people/' + ${person.id} + '/edit'}" class="btn btn-sm btn-warning">Edit</a>
                <!-- Optional delete button -->
                <!-- <a th:href="@{'/people/' + ${person.id} + '/delete'}" class="btn btn-sm btn-danger" onclick="return confirm('Are you sure?')">Delete</a> -->
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
