<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:if="${people.id == null}">Create Person</title>
    <title th:if="${people.id != null}">Edit Person</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
    <h1 th:if="${people.id == null}">Create New Person</h1>
    <h1 th:if="${people.id != null}">Edit Person</h1>

    <form th:action="${people.id == null} ? @{/people} : @{'/people/' + ${people.id}}" th:object="${people}" method="post" class="mt-3">
        <!-- Hidden _method for PUT if needed; but we use POST to same URL with id -->
        <div class="mb-3">
            <label for="fullName" class="form-label">Full Name</label>
            <input type="text" class="form-control" id="fullName" th:field="*{fullName}"
                   th:errorclass="is-invalid" placeholder="Enter full name">
            <div class="invalid-feedback" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></div>
        </div>

        <div class="mb-3">
            <label for="pin" class="form-label">PIN (10 digits)</label>
            <input type="text" class="form-control" id="pin" th:field="*{pin}"
                   th:errorclass="is-invalid" placeholder="Enter 10-digit PIN">
            <div class="invalid-feedback" th:if="${#fields.hasErrors('pin')}" th:errors="*{pin}"></div>
        </div>

        <button type="submit" class="btn btn-primary">Save</button>
        <a th:href="@{/people}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
</body>
</html>
